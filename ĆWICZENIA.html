<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W Szponach Gitary — Biblioteka Ćwiczeń</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0f0f0f; --surface:#1a1a1a; --border:#2e2e2e; --accent:#c8a84b; --text:#f0ece0; --muted:#888; --radius:10px; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; }

  /* LOGIN */
  #login-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:14px; }
  #login-screen .lock-logo { font-family:'Oswald',sans-serif; font-size:22px; color:var(--accent); letter-spacing:0.04em; margin-bottom:8px; }
  #login-screen input { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:10px 16px; font-size:15px; font-family:'Inter',sans-serif; outline:none; width:240px; text-align:center; letter-spacing:0.1em; transition:border-color 0.15s; }
  #login-screen input:focus { border-color:var(--accent); }
  #login-screen input.error { border-color:#e87070; animation:shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  #login-btn { background:var(--accent); color:#0f0f0f; border:none; border-radius:8px; padding:10px 28px; font-size:14px; font-family:'Oswald',sans-serif; letter-spacing:0.06em; cursor:pointer; font-weight:600; transition:opacity 0.15s; }
  #login-btn:hover { opacity:0.85; }
  #login-error { font-size:12px; color:#e87070; display:none; }
  #login-hint { font-size:12px; color:var(--muted); }

  /* HEADER */
  header { border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:58px; background:var(--bg); position:sticky; top:0; z-index:10; }
  .logo { font-family:'Oswald',sans-serif; font-size:18px; letter-spacing:0.04em; color:var(--accent); }
  .logo span { color:var(--text); }
  .header-right { font-size:12px; color:var(--muted); }

  /* HERO */
  .hero { padding:2rem 2rem 1.5rem; border-bottom:1px solid var(--border); }
  .hero h1 { font-family:'Oswald',sans-serif; font-size:26px; font-weight:600; margin-bottom:4px; }
  .hero h1 span { color:var(--accent); }
  .hero p { font-size:13px; color:var(--muted); }

  /* TOOLBAR */
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:1rem 2rem; border-bottom:1px solid var(--border); background:var(--bg); position:sticky; top:58px; z-index:9; }
  .toolbar input, .toolbar select { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:7px 12px; font-size:13px; font-family:'Inter',sans-serif; outline:none; transition:border-color 0.15s; }
  .toolbar input { width:200px; }
  .toolbar input::placeholder { color:var(--muted); }
  .toolbar input:focus, .toolbar select:focus { border-color:var(--accent); }
  .toolbar select option { background:#1a1a1a; }
  .count { margin-left:auto; font-size:12px; color:var(--muted); }
  .btn-toolbar { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:7px 11px; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; transition:border-color 0.15s, color 0.15s; }
  .btn-toolbar:hover { border-color:var(--accent); color:var(--accent); }

  /* TAGS ROW */
  .tags-row { display:flex; gap:6px; flex-wrap:wrap; padding:0.75rem 2rem; border-bottom:1px solid var(--border); min-height:42px; align-items:center; }
  .tag-chip { font-size:11px; padding:3px 10px; border-radius:99px; border:1px solid var(--border); color:var(--muted); cursor:pointer; background:transparent; font-family:'Inter',sans-serif; transition:all 0.15s; }
  .tag-chip:hover, .tag-chip.active { border-color:var(--accent); color:var(--accent); background:#1a1500; }
  .tags-label { font-size:11px; color:var(--muted); margin-right:4px; }

  /* GRID */
  .grid-wrap { padding:1.5rem 2rem 3rem; }
  .section-label { font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; }

  /* CARD */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:border-color 0.2s, transform 0.15s; text-decoration:none; display:block; }
  .card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .thumb { height:115px; display:flex; align-items:center; justify-content:center; font-size:38px; position:relative; overflow:hidden; }
  .thumb img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; display:block; }
  .thumb-icon { position:relative; z-index:1; }
  .card-body { padding:10px 12px 13px; }
  .card-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:6px; line-height:1.35; }
  .card-desc { font-size:11px; color:var(--muted); margin-bottom:8px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-tags { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:7px; }
  .card-tag { font-size:10px; padding:1px 6px; border-radius:99px; background:#1a1500; color:#c8a84b88; border:1px solid #2e2500; }
  .badges { display:flex; flex-wrap:wrap; gap:4px; }
  .badge { font-size:10px; padding:2px 7px; border-radius:99px; font-weight:500; }
  .b-poc { background:#1a2e14; color:#7bc96f; border:1px solid #2a4a20; }
  .b-sr  { background:#2e2010; color:#e8a84b; border:1px solid #4a3318; }
  .b-zaa { background:#2e1010; color:#e87070; border:1px solid #4a2020; }
  .b-kat { background:#1a1a2e; color:#8888ee; border:1px solid #2a2a4a; }

  .state-msg { text-align:center; padding:4rem 2rem; color:var(--muted); font-size:14px; }

  @media print {
    #login-screen, header, .toolbar, .tags-row { display:none !important; }
    body { background:white !important; color:black !important; }
    .card { border:1px solid #ccc !important; break-inside:avoid; }
    .card-title { color:black !important; }
    .card-desc { color:#555 !important; }
    .thumb { background:#eee !important; }
    .grid-wrap { padding:0 !important; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="lock-logo">🔒 W Szponach Gitary</div>
  <input type="password" id="pwd-input" placeholder="Wpisz hasło…" onkeydown="if(event.key==='Enter')checkPwd()">
  <button id="login-btn" onclick="checkPwd()">WEJDŹ</button>
  <div id="login-error">Złe hasło — spróbuj jeszcze raz.</div>
  <div id="login-hint">Strefa Patronów · hasło zmienia się co miesiąc</div>
</div>

<header>
  <div class="logo">🎸 W Szponach Gitary <span>/ Ćwiczenia</span></div>
  <div class="header-right">Strefa Patronów</div>
</header>

<div class="hero">
  <h1>Biblioteka <span>ćwiczeń</span></h1>
  <p>Kliknij kartę, żeby otworzyć materiały na Google Drive.</p>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="🔍  Szukaj ćwiczenia…" oninput="render()">
  <select id="kat" onchange="render()"><option value="">Wszystkie kategorie</option></select>
  <select id="lvl" onchange="render()">
    <option value="">Wszystkie poziomy</option>
    <option>Początkujący</option>
    <option>Średni</option>
    <option>Zaawansowany</option>
  </select>
  <button class="btn-toolbar" onclick="resetFilters()">✕ Reset</button>
  <button class="btn-toolbar" onclick="window.print()">⬇ Zapisz PDF</button>
  <span class="count" id="count"></span>
</div>

<div class="tags-row" id="tags-row">
  <span class="tags-label">Tagi:</span>
</div>

<div class="grid-wrap">
  <div class="section-label" id="section-label">Wszystkie ćwiczenia</div>
  <div class="grid" id="grid"></div>
  <div class="state-msg" id="state-msg">Ładowanie ćwiczeń…</div>
</div>

<script>
// ==============================
// ZMIEŃ HASŁO TUTAJ co miesiąc:
const HASLO = 'szpon';
// ==============================

const PLIK = "https://raw.githubusercontent.com/WujekSzpon/-wiczenia-gitarowe/main/%C4%86WICZENIA.xlsx";

const IKONY = {
  'legato':         { icon:'🎯', bg:'#1a1a2e' },
  'shred':          { icon:'⚡', bg:'#2e1010' },
  'kostkow':        { icon:'🥁', bg:'#2e2010' },
  'synchronizacja': { icon:'🤝', bg:'#1a2e1a' },
  'fingerstyle':    { icon:'🎸', bg:'#1a2e2e' },
  'fingerpicking':  { icon:'🎸', bg:'#1a2e2e' },
  'barre':          { icon:'✋', bg:'#2e1a2e' },
  'bend':           { icon:'〰️', bg:'#2e2a10' },
  'vibrato':        { icon:'🌊', bg:'#102e2e' },
  'tapping':        { icon:'🤟', bg:'#2e1020' },
  'rozgrzewka':     { icon:'🔥', bg:'#2e1a10' },
  'arpegg':         { icon:'🎵', bg:'#1e2e1a' },
  'default':        { icon:'🎵', bg:'#1e1e1e' },
};

function getIkona(kat) {
  if (!kat) return IKONY.default;
  const k = kat.toLowerCase();
  for (const key of Object.keys(IKONY)) {
    if (k.includes(key)) return IKONY[key];
  }
  return IKONY.default;
}

function levelClass(l) {
  if (!l) return 'b-kat';
  const lo = l.toLowerCase();
  if (lo.includes('pocz')) return 'b-poc';
  if (lo.includes('śred') || lo.includes('sred')) return 'b-sr';
  if (lo.includes('zaaw')) return 'b-zaa';
  return 'b-kat';
}

function checkPwd() {
  const val = document.getElementById('pwd-input').value;
  const inp = document.getElementById('pwd-input');
  const err = document.getElementById('login-error');
  if (val === HASLO) {
    document.getElementById('login-screen').style.display = 'none';
    loadExcel();
  } else {
    inp.classList.add('error');
    err.style.display = 'block';
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 600);
  }
}

let exercises = [];
let activeTag = '';

function loadExcel() {
  fetch(PLIK)
    .then(r => { if (!r.ok) throw new Error('Nie znaleziono pliku ' + PLIK); return r.arrayBuffer(); })
    .then(buf => {
      const wb = XLSX.read(buf, { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
      exercises = rows.map((r, i) => ({
        id: i,
        nazwa:   r['NAZWA']           || '',
        kat:     r['KATEGORIA']        || '',
        poziom:  r['POZIOM']           || '',
        tagi:    (r['TAGI'] || '').split(',').map(t => t.trim()).filter(Boolean),
        link:    r['LINK']             || '#',
        okladka: r['LINK DO OKŁADKI'] || '',
        opis:    r['OPIS']             || '',
      })).filter(e => e.nazwa);

      // Populate kategorie
      const kats = [...new Set(exercises.map(e => e.kat).filter(Boolean))].sort();
      const sel = document.getElementById('kat');
      kats.forEach(k => { const o = document.createElement('option'); o.value = o.textContent = k; sel.appendChild(o); });

      // Populate tagi
      const allTags = [...new Set(exercises.flatMap(e => e.tagi))].sort();
      const tagsRow = document.getElementById('tags-row');
      tagsRow.innerHTML = '<span class="tags-label">Tagi:</span>';
      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-chip';
        btn.textContent = tag;
        btn.onclick = () => toggleTag(tag, btn);
        tagsRow.appendChild(btn);
      });

      document.getElementById('state-msg').style.display = 'none';
      render();
    })
    .catch(e => {
      document.getElementById('state-msg').textContent = '⚠️ ' + e.message + ' — upewnij się że plik ĆWICZENIA.xlsx jest w tym samym folderze co ten plik HTML.';
    });
}

function toggleTag(tag, btn) {
  if (activeTag === tag) {
    activeTag = '';
    btn.classList.remove('active');
  } else {
    document.querySelectorAll('.tag-chip').forEach(b => b.classList.remove('active'));
    activeTag = tag;
    btn.classList.add('active');
  }
  render();
}

function render() {
  const q  = document.getElementById('search').value.toLowerCase();
  const kt = document.getElementById('kat').value;
  const lv = document.getElementById('lvl').value;

  const filtered = exercises.filter(e =>
    (!q  || e.nazwa.toLowerCase().includes(q) || e.opis.toLowerCase().includes(q) || e.tagi.some(t => t.toLowerCase().includes(q))) &&
    (!kt || e.kat === kt) &&
    (!lv || e.poziom === lv) &&
    (!activeTag || e.tagi.includes(activeTag))
  );

  document.getElementById('count').textContent = filtered.length + ' ćwiczeń';

  const parts = [];
  if (kt) parts.push(kt);
  if (lv) parts.push(lv);
  if (activeTag) parts.push('#' + activeTag);
  document.getElementById('section-label').textContent = parts.length ? parts.join(' · ') : 'Wszystkie ćwiczenia';

  const grid = document.getElementById('grid');
  const msg  = document.getElementById('state-msg');

  if (!filtered.length) {
    grid.innerHTML = '';
    msg.style.display = 'block';
    msg.textContent = 'Brak ćwiczeń dla tych filtrów.';
    return;
  }
  msg.style.display = 'none';

  grid.innerHTML = filtered.map(e => {
    const ik = getIkona(e.kat);
    const thumb = e.okladka
      ? `<img src="${e.okladka}" alt="${e.nazwa}" loading="lazy">`
      : `<span class="thumb-icon">${ik.icon}</span>`;
    const desc = e.opis ? `<div class="card-desc">${e.opis}</div>` : '';
    const tagsHtml = e.tagi.length ? `<div class="card-tags">${e.tagi.map(t => `<span class="card-tag">${t}</span>`).join('')}</div>` : '';
    const katBadge = e.kat ? `<span class="badge b-kat">${e.kat}</span>` : '';
    const lvBadge  = e.poziom ? `<span class="badge ${levelClass(e.poziom)}">${e.poziom}</span>` : '';
    return `
      <a class="card" href="${e.link}" target="_blank" rel="noopener">
        <div class="thumb" style="background:${ik.bg}">${thumb}</div>
        <div class="card-body">
          <div class="card-title">${e.nazwa}</div>
          ${desc}
          ${tagsHtml}
          <div class="badges">${lvBadge}${katBadge}</div>
        </div>
      </a>`;
  }).join('');
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('kat').value = '';
  document.getElementById('lvl').value = '';
  activeTag = '';
  document.querySelectorAll('.tag-chip').forEach(b => b.classList.remove('active'));
  render();
}
</script>
</body>
</html>
